apiVersion: v1
kind: Service
metadata:
  name: {{ include "whatsapp-monitor.fullname" . }}-postgres
  labels:
    {{- include "whatsapp-monitor.labels" . | nindent 4 }}
spec:
  selector:
    app: postgres
  type: {{ .Values.postgres.service.type }}
  ports:
    - port: 5432
      targetPort: 5432
      {{- if eq .Values.postgres.service.type "NodePort" }}
      nodePort: {{ .Values.postgres.service.nodePort }}
      {{- end }}
