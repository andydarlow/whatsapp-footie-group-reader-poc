apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "whatsapp-monitor.fullname" . }}-kafka-data
  labels:
    {{- include "whatsapp-monitor.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.kafka.storage }}
  storageClassName: {{ .Values.kafka.storageClass }}
