apiVersion: v1
kind: Service
metadata:
  name: {{ include "whatsapp-monitor.fullname" . }}-kafka
  labels:
    {{- include "whatsapp-monitor.labels" . | nindent 4 }}
spec:
  selector:
    app: kafka
  type: NodePort
  ports:
    - name: internal
      port: 9092
      targetPort: 31092
      nodePort: 31092

